// ── Color swatch ────────────────────────────────────────────────────────────

function Swatch({ token, hex, dark }) {
  const [copied, setCopied] = useState(false);
  const copy = () => {
    try { navigator.clipboard.writeText(hex); } catch (_) {}
    setCopied(true);
    setTimeout(() => setCopied(false), 1400);
  };
  return (
    <button onClick={copy}
      className="group flex flex-col rounded-xl overflow-hidden ring-1 ring-black/[0.08] shadow-xs hover:shadow-soft transition-all text-left w-full focus-visible:ring-2 focus-visible:ring-vnd-primary-500">
      <div className="h-12 w-full transition-transform group-hover:scale-y-[1.04] origin-bottom"
        style={{ backgroundColor: hex }} />
      <div className="bg-white px-2.5 pt-2 pb-2.5">
        <p className={`font-mono text-[10.5px] font-bold leading-none ${copied ? "text-vnd-accent-green" : "text-vnd-primary-900"}`}>
          {copied ? "✓ copied" : hex}
        </p>
        <p className="text-[9.5px] text-on-surface-variant mt-1 truncate">{token}</p>
      </div>
    </button>
  );
}

// ── Design System page ──────────────────────────────────────────────────────

function DesignSystem() {
  const [activeId, setActiveId] = useState("colors");
  const [tabVal, setTabVal]     = useState("all");
  const [toggleA, setToggleA]   = useState(true);
  const [toggleB, setToggleB]   = useState(false);
  const [toggleC, setToggleC]   = useState(true);

  // IntersectionObserver drives sidebar active state
  useEffect(() => {
    const allIds = NAV_SECTIONS.flatMap(g => g.items.map(i => i.id));
    const obs = new IntersectionObserver(
      entries => entries.forEach(e => { if (e.isIntersecting) setActiveId(e.target.id); }),
      { rootMargin: "-28% 0px -60% 0px" }
    );
    allIds.forEach(id => { const el = document.getElementById(id); if (el) obs.observe(el); });
    return () => obs.disconnect();

              <div className="bg-white rounded-xl p-5 ring-1 ring-outline-variant/30 inline-block">
                <Tabs dense value={tabVal} onChange={setTabVal}
                  tabs={[
                    { id: "all",  label: "Tất cả",   icon: "apps" },
                    { id: "p1",   label: "Active",    icon: "bolt" },
                    { id: "done", label: "Archived",  icon: "archive" },
                  ]}
                />
              </div>
            </div>
          </Section>

          {/* ── TOGGLE ── */}
          <Section id="toggle">
            <SecHeader sub="Boolean switch. Props: on, onChange, label, hint.">
              Toggle / Switch
            </SecHeader>
            <div className="grid grid-cols-2 gap-4 max-w-lg">
              <div className="bg-white p-5 rounded-xl ring-1 ring-outline-variant/30 space-y-4">
                <Toggle on={toggleA} onChange={setToggleA} label="Compact sidebar" hint="Thu gọn còn icon" />
                <Toggle on={toggleB} onChange={setToggleB} label="Dark mode" hint="Chưa hỗ trợ" />
                <Toggle on={toggleC} onChange={setToggleC} label="Nhận thông báo" hint="Push notifications" />
              </div>
              <div className="bg-surface-container p-5 rounded-xl ring-1 ring-outline-variant/30 flex flex-col gap-2">
                <p className="text-[10.5px] font-bold uppercase tracking-wider text-on-surface-variant mb-1">State</p>
                {[
                  { l: "Compact sidebar", v: toggleA },
                  { l: "Dark mode",       v: toggleB },
                  { l: "Thông báo",       v: toggleC },
                ].map(({ l, v }) => (
                  <div key={l} className="flex items-center justify-between">
                    <span className="text-[12px] text-on-surface">{l}</span>
                    <Badge tone={v ? "green" : "neutral"} size="xs">{v ? "on" : "off"}</Badge>
                  </div>
                ))}
              </div>
            </div>
          </Section>

          {/* ── TEXT FIELD ── */}
          <Section id="textfield">
            <SecHeader sub="Controlled-friendly. Props: label, hint, error, icon, suffix, as (input/textarea/select).">
              TextField
            </SecHeader>
            <div className="grid grid-cols-2 gap-4 max-w-xl">
              <TextField label="Tên khách hàng" placeholder="Nguyễn Văn A" icon="person" />
              <TextField label="Email" placeholder="kh@vndirect.com.vn" icon="mail" hint="Email công ty hoặc cá nhân" />
              <TextField label="Số điện thoại" placeholder="+84 90 xxx xxxx" icon="call" error="Số điện thoại không hợp lệ" />
              <TextField label="Tìm kiếm" placeholder="Tìm KH, lead, sản phẩm…" icon="search" />
            </div>
          </Section>

          {/* ── CHIPS ── */}
          <Section id="chips">
            <SecHeader sub="ChipToggle: boolean filter toggle. FilterBar: flex-wrap container. active prop drives state.">
              Chips &amp; Filter Bar
            </SecHeader>
            <div className="mb-5">
              <GroupLabel>Filter row — some active</GroupLabel>
              <div className="bg-white p-4 rounded-xl ring-1 ring-outline-variant/30">
                <FilterBar>
                  {[
                    { l: "Pipeline",       active: true,  icon: "filter_list" },
                    { l: "P1 Urgent",      active: true,  icon: undefined },
                    { l: "Hot lead",       active: false, icon: undefined },
                    { l: "Chưa liên hệ",  active: false, icon: undefined },
                    { l: "VIP",            active: false, icon: undefined },
                    { l: "Referral only",  active: false, icon: undefined },
                  ].map(({ l, active, icon }) => (
                    <ChipToggle key={l} active={active} icon={icon}>{l}</ChipToggle>
                  ))}
                </FilterBar>
              </div>
            </div>
            <div>
              <GroupLabel>With icons — AI Buddy context chips</GroupLabel>
              <div className="bg-white p-4 rounded-xl ring-1 ring-outline-variant/30">
                <FilterBar>
                  <ChipToggle active icon="dataset">Dữ liệu KH</ChipToggle>
                  <ChipToggle active icon="show_chart">Pipeline</ChipToggle>
                  <ChipToggle icon="psychology">Insight</ChipToggle>
                  <ChipToggle icon="campaign">NAC Alert</ChipToggle>
                  <ChipToggle icon="inventory_2">Sản phẩm</ChipToggle>
                </FilterBar>
              </div>
            </div>
          </Section>

          {/* ── EMPTY STATE ── */}
          <Section id="empty">
            <SecHeader sub="Props: icon, title, sub, action. Used when a list or query returns no results.">
              Empty State
            </SecHeader>
            <div className="grid grid-cols-2 gap-4">
              <div className="bg-white rounded-xl ring-1 ring-outline-variant/30">
                <Empty icon="inbox" title="Chưa có lead nào"
                  sub="Thêm lead từ nguồn referral hoặc import từ campaign."
                  action={<Button tone="primary" size="sm" icon="add">Thêm lead</Button>} />
              </div>
              <div className="bg-white rounded-xl ring-1 ring-outline-variant/30">
                <Empty icon="search" title="Không tìm thấy kết quả"
                  sub="Thử thay đổi từ khoá hoặc bộ lọc hiện tại." />
              </div>
            </div>
          </Section>

          {/* ── STAT TILE ── */}
          <Section id="stat">
            <SecHeader sub="Props: label, value, sub, trend (number), icon, tone. Used in executive dashboards.">
              Stat Tile
            </SecHeader>
            <div className="grid grid-cols-2 xl:grid-cols-4 gap-4">
              {[
                { label: "Lead đang chăm sóc", value: "1,284", trend: 12.0, icon: "diversity_3",         tone: "blue",   sub: "+45 lead tuần này" },
                { label: "Doanh thu dự kiến",  value: "4.2 tỷ", trend: 8.4, icon: "payments",            tone: "green",  sub: "Pipeline weighted" },
                { label: "Onboard đang chạy",  value: "12",    trend: -4.2, icon: "fact_check",           tone: "amber",  sub: "3 vướng compliance" },
                { label: "AUM phụ trách",      value: "184 tỷ", trend: 6.8, icon: "stacked_line_chart",   tone: "purple", sub: "Active clients · 128" },
              ].map((s, i) => <Card key={i}><Stat {...s} /></Card>)}
            </div>
          </Section>

          {/* ── SPARKLINE ── */}
          <Section id="sparkline">
            <SecHeader sub="Props: data[], width, height, stroke, fill. SVG mini-chart. Inline in tables or KPI cards.">
              Sparkline
            </SecHeader>
            <div className="flex flex-wrap items-start gap-6 p-6 bg-white rounded-xl ring-1 ring-outline-variant/30">
              {[
                { data: sparkA, w: 120, h: 40, stroke: "#0077ED", fill: "rgba(0,119,237,.12)",  label: "vnd-primary — up" },
                { data: sparkA, w: 180, h: 54, stroke: "#00C97D", fill: "rgba(0,201,125,.10)",  label: "accent-green · 180×54" },
                { data: sparkB, w: 120, h: 40, stroke: "#EF4444", fill: "rgba(239,68,68,.08)",  label: "vnd-danger — down" },
                { data: sparkA, w: 80,  h: 32, stroke: "#FF8C33", fill: "rgba(255,140,51,.10)", label: "warning · 80×32 (inline)" },
              ].map((s, i) => (
                <div key={i} className="flex flex-col gap-1.5">
                  <Sparkline data={s.data} width={s.w} height={s.h} stroke={s.stroke} fill={s.fill} />
                  <p className="text-[10.5px] font-mono text-on-surface-variant">{s.label}</p>
                </div>
              ))}
            </div>
          </Section>

          {/* ── BAR CHART ── */}
          <Section id="barchart">
            <SecHeader sub="Props: data=[{value,label,highlight?}], height. Hover reveals value tooltip. Highlight bar uses vnd-primary-500.">
              Bar Chart
            </SecHeader>
            <Card className="max-w-lg">
              <SectionTitle sub="Conversion lead → ký hợp đồng theo ngày"
                action={<Button tone="ghost" size="sm" icon="open_in_new">Phân tích</Button>}>
                Tiến độ Hiệu suất
              </SectionTitle>
              <BarChart data={barData} height={180} />
            </Card>
          </Section>

          {/* ── DONUT CHART ── */}
          <Section id="donut">
            <SecHeader sub="Props: data=[{label,pct,color}], size, thickness, centerLabel, centerValue. Allocation visualization.">
              Donut Chart
            </SecHeader>
            <div className="flex items-start gap-8 p-6 bg-white rounded-xl ring-1 ring-outline-variant/30 max-w-md">
              <DonutChart data={donutData} size={180} thickness={22} centerValue="100%" centerLabel="Allocation" />
              <div className="flex flex-col gap-2.5 pt-1">
                {donutData.map(d => (
                  <div key={d.label} className="flex items-center gap-2.5">
                    <span className="w-3 h-3 rounded-sm flex-shrink-0" style={{ backgroundColor: d.color }} />
                    <span className="text-[13px] text-on-surface">{d.label}</span>
                    <span className="font-mono text-[12px] text-on-surface-variant ml-auto pl-4">{d.pct}%</span>
                  </div>
                ))}
              </div>
            </div>
          </Section>

          {/* ── PROGRESS RING ── */}
          <Section id="progress">
            <SecHeader sub="Props: value (0–100), size, thickness, label (override), sub. SVG ring. Used for skill progress, BMI track.">
              Progress Ring
            </SecHeader>
            <div className="flex flex-wrap items-end gap-6 p-6 bg-white rounded-xl ring-1 ring-outline-variant/30">
              {[
                { value: 78,  size: 60,  thickness: 5, sub: "Investment" },
                { value: 62,  size: 76,  thickness: 6, sub: "Coaching"   },
                { value: 92,  size: 92,  thickness: 7, sub: "Compliance" },
                { value: 41,  size: 108, thickness: 8, sub: "Estate"     },
                { value: 100, size: 72,  thickness: 6, sub: "Complete"   },
              ].map((r, i) => (
                <div key={i} className="flex flex-col items-center gap-2">
                  <ProgressRing {...r} />
                  <p className="text-[10.5px] font-mono text-on-surface-variant text-center">{r.sub}</p>
                </div>
              ))}
            </div>
          </Section>

          {/* Footer */}
          <footer className="py-14 text-center space-y-2">
            <div className="flex items-center justify-center gap-3 mb-4">
              <div className="w-9 h-9 bg-vnd-primary-900 rounded-lg flex items-center justify-center text-white font-display font-bold text-[18px]">D</div>
              <p className="font-display font-bold text-title-lg text-vnd-primary-900">DSB Design System</p>
              <Badge tone="blue" size="sm">v2.0</Badge>
            </div>
            <p className="text-[12px] text-on-surface-variant">VNDIRECT · Dynamic Service Blueprint · Financial Advisor OS</p>
            <p className="font-mono text-[10.5px] text-on-surface-variant/60">
              Tailwind CSS · React 18 · Babel · Material Symbols Outlined · Lexend · Inter · JetBrains Mono
            </p>
            <div className="flex items-center justify-center gap-4 mt-4">
              <a href="index.html" className="text-[12px] text-vnd-primary-700 hover:underline font-medium">App →</a>
              <a href="login.html" className="text-[12px] text-vnd-primary-700 hover:underline font-medium">Login →</a>
            </div>
          </footer>

        </main>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<DesignSystem />);
</script>
</body>
</html>
